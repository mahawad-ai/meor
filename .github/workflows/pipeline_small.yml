name: Small TLD Pipeline

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

jobs:
  small-tlds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv supabase

      - name: Restore zone cache
        uses: actions/cache@v4
        with:
          path: zone_cache
          key: zone-small-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            zone-small-${{ runner.os }}-

      - name: Ensure directories
        run: mkdir -p zone_cache data

      - name: Run small TLD pipeline
        env:
          CZDS_USERNAME: ${{ secrets.CZDS_USERNAME }}
          CZDS_PASSWORD: ${{ secrets.CZDS_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python pipeline_small.py

      - name: Save zone cache
        if: always()
        uses: actions/cache@v4
        with:
          path: zone_cache
          key: zone-small-${{ runner.os }}-${{ github.run_id }}
