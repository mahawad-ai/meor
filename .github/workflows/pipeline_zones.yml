name: Zone File Drop Detection

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC daily — after most registrars publish zone files
  workflow_dispatch:       # allow manual trigger

jobs:
  detect-drops:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # .com sort+diff takes ~60-90 min on free runner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv supabase

      - name: Set date env vars
        run: |
          echo "TODAY=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      # Restore yesterday's names cache
      # Cache stores only compressed sorted-names files (~1-2GB total)
      # NOT raw zone files — that was causing 10GB limit failures
      - name: Restore zone names cache
        uses: actions/cache/restore@v4
        with:
          path: zone_cache
          # Exact key never matches (today's not saved yet) — always uses fallback
          key: zone-names-${{ runner.os }}-${{ env.TODAY }}
          restore-keys: |
            zone-names-${{ runner.os }}-

      - name: Ensure cache directory exists
        run: mkdir -p zone_cache

      - name: Run zone pipeline
        env:
          CZDS_USERNAME: ${{ secrets.CZDS_USERNAME }}
          CZDS_PASSWORD: ${{ secrets.CZDS_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python pipeline_zones.py

      # Save today's names cache for tomorrow's diff
      # Only .names.gz files are in zone_cache now — much smaller than before
      - name: Save zone names cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: zone_cache
          key: zone-names-${{ runner.os }}-${{ env.TODAY }}
