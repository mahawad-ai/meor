name: MENA DNS Pipeline

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC daily (after zone pipeline finishes)
  workflow_dispatch:

jobs:
  mena-dns:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv supabase

      # Restore watchlist from previous run so we maintain state
      - name: Restore MENA watchlist cache
        uses: actions/cache/restore@v4
        with:
          path: data/mena_watchlist.txt
          key: mena-watchlist-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            mena-watchlist-${{ runner.os }}-

      - name: Ensure directories
        run: mkdir -p data

      - name: Run MENA pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python pipeline_mena.py

      # Save updated watchlist (with rotation applied) for next run
      - name: Save MENA watchlist cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/mena_watchlist.txt
          key: mena-watchlist-${{ runner.os }}-${{ github.run_id }}
