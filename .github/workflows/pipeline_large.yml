name: Large TLD Pipeline

on:
  schedule:
    - cron: '0 2 * * *'   # 2am daily
  workflow_dispatch:

jobs:
  large-tlds:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv supabase

      - name: Restore large zone cache
        uses: actions/cache@v4
        with:
          path: zone_cache_large
          key: zone-large-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            zone-large-${{ runner.os }}-

      - name: Ensure directories
        run: mkdir -p zone_cache_large data

      - name: Run large TLD pipeline
        env:
          CZDS_USERNAME: ${{ secrets.CZDS_USERNAME }}
          CZDS_PASSWORD: ${{ secrets.CZDS_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python pipeline_large.py

      - name: Save large zone cache
        if: always()
        uses: actions/cache@v4
        with:
          path: zone_cache_large
          key: zone-large-${{ runner.os }}-${{ github.run_id }}
